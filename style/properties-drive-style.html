<!DOCTYPE html>
<html>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>User Interactions - Draw tool to draw geometries</title>
<style type="text/css">
    html,
    body {
        margin: 0px;
        height: 100%;
        width: 100%
    }

    .container {
        width: 100%;
        height: 100%
    }
</style>
<link rel='stylesheet' href='./../assets/lib/maptalks/maptalks.css' />

<script type='text/javascript' src='./../assets/lib/maptalks/maptalks-gl.js'></script>
<script type='text/javascript' src='./../assets/lib/lil-gui.min.js'></script>
<script type='text/javascript' src='./../assets/lib/randomColor.js'></script>

<body>

    <button onclick="updateName()">update name</button>
    <div id="map" class="container"></div>

    <script>

        var map = new maptalks.Map('map', {
            center: [121.47400292, 31.22976969],
            zoom: 11,
            pitch: 55,
            // baseLayer: new maptalks.TileLayer('base', {
            //     urlTemplate: "https://webrd01.is.autonavi.com/appmaptile?lang=zh_cn&size=1&scale=1&style=8&x={x}&y={y}&z={z}",
            //     subdomains: ["a", "b", "c", "d"],
            // })
        });

        var layer = new maptalks.VectorLayer('vector')
            .addTo(map);

        // set style to layer

        layer.setStyle([
            {
                'filter': ['has', 'name'],
                'symbol': {
                    markerType: 'ellipse',
                    makrerWidth: 10,
                    markerHeight: 10
                }

            },
            {

                'filter': ['!has', 'name'],
                'symbol': {
                    markerType: 'rectangle',
                    makrerWidth: 10,
                    markerHeight: 10,
                    markerFill: 'red'
                }

            }
        ]);


        const geojson = {
            "type": "FeatureCollection",
            "features": [
                {
                    "type": "Feature",
                    "geometry": {
                        "type": "Point",
                        "coordinates": [
                            121.55377569937878,
                            31.18720953362694
                        ]
                    },
                    "properties": {
                        "type": '1',
                        "name": "1",
                        "count": 5,
                        "_color": "",
                        "center": [
                            121.55377569937878,
                            31.18720953362694,
                            0
                        ]
                    }
                },
                {
                    "type": "Feature",
                    "geometry": {
                        "type": "Point",
                        "coordinates": [
                            121.60544368059459,
                            31.149035734143553
                        ]
                    },
                    "properties": {
                        "type": '2',
                        "name": "2",
                        "_color": "",
                        "count": 10,
                        "center": [
                            121.60544368059459,
                            31.149035734143553,
                            0
                        ]
                    }
                },
                {
                    "type": "Feature",
                    "geometry": {
                        "type": "Point",
                        "coordinates": [
                            121.52022011010195,
                            31.142835118388433
                        ]
                    },
                    "properties": {
                        "type": '3',
                        "name": "3",
                        "count": 1,
                        "_color": "",
                        "center": [
                            121.52022011010195,
                            31.142835118388433,
                            0
                        ]
                    }
                },
                {
                    "type": "Feature",
                    "geometry": {
                        "type": "Point",
                        "coordinates": [
                            121.62698789416424,
                            31.18476295670925
                        ]
                    },
                    "properties": {
                        "type": '4',

                        "count": 20,
                        "_color": "",
                        "center": [
                            121.62698789416424,
                            31.18476295670925,
                            0
                        ]
                    }
                }
            ]
        };

        const points = maptalks.GeoJSON.toGeometry(geojson);

        layer.addGeometry(points);

        function updateName() {
            const p = points[points.length - 1];
            p.setProperties(Object.assign({}, p.getProperties(), { name: 'new name' }));
        }




    </script>
</body>

</html>
