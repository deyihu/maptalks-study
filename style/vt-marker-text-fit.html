<!DOCTYPE html>
<html>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>User Interactions - Draw tool to draw geometries</title>
<style type="text/css">
    html,
    body {
        margin: 0px;
        height: 100%;
        width: 100%
    }

    .container {
        width: 100%;
        height: 100%
    }
</style>
<link rel='stylesheet' href='./../assets/lib/maptalks/maptalks.css' />

<script type='text/javascript' src='./../assets/lib/maptalks/maptalks-gl.js'></script>
<script type='text/javascript' src='./../assets/lib/lil-gui.min.js'></script>
<script type='text/javascript' src='./../assets/lib/randomColor.js'></script>

<body>

    <div id="map" class="container"></div>

    <script>

        var map = new maptalks.Map('map', {
            center: [121.47400292, 31.22976969],
            zoom: 11,
            pitch: 55,
            // baseLayer: new maptalks.TileLayer('base', {
            //     urlTemplate: "https://webrd01.is.autonavi.com/appmaptile?lang=zh_cn&size=1&scale=1&style=8&x={x}&y={y}&z={z}",
            //     subdomains: ["a", "b", "c", "d"],
            // })
        });

        const style = {
            style: [
                {
                    filter: true,
                    renderPlugin: {
                        dataConfig: {
                            type: "point",
                        },
                        sceneConfig: {
                            // minZoom: 8,
                            // maxZoom: 12
                        },
                        type: "icon",
                    },
                    symbol: {
   
                        markerType: 'rectangle',
                        markerFill: 'black',
                        markerTextFitPadding: [4, 4, 0, 4],
                        markerWidth: 200,
                        markerHeight: 20,
                        markerTextFit: 'both',

                        textFill: '#fff',
                        // textDy: 8,
                        // textHaloFill: '#fff',
                        // textHaloRadius: 1,
                        textSize: 16,
                        textName: '{name}',
                        textVerticalAlignment: 'bottom'
                    },
                },
          
            ]

        };

        const layer = new maptalks.GeoJSONVectorTileLayer("geo", {
            // debug: true,
            // debugTile:true,
            data: "./../assets/data/citys1.geojson",
            style,
            features: true,
            pickingGeometry: true,
        });

        layer.on("dataload", (e) => {
            map.fitExtent(e.extent);
        });

        const groupGLLayer = new maptalks.GroupGLLayer("gl", [layer], {
            sceneConfig: {
                environment: {
                    enable: true,
                    mode: 1,
                    level: 0,
                    brightness: 0
                },
                postProcess: {
                    enable: true,
                    bloom: {
                        enable: true,
                        threshold: 0,
                        factor: 0.6,
                        radius: 1,
                    },
                }
            }
        }).addTo(map);






    </script>
</body>

</html>
